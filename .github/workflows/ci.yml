name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # The package uses lazy imports for the heavy ML stack (torch, ultralytics,
        # OpenCV), so the pure-logic test suite runs without a GPU or those wheels.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml pillow pytest pytest-cov ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest --cov=wildlife_detector --cov-report=term-missing

  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
