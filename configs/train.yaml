# =============================================================================
# Training / evaluation configuration.
# Consumed by `wildlife-detect train` and `wildlife-detect evaluate`.
# These hyper-parameters reproduce the reported results:
#   ~0.98 precision, 0.87 mAP@0.5, 0.82 mean IoU on the held-out set.
# =============================================================================

# Path to the YOLO dataset descriptor emitted by the `prepare` step.
data: data/processed/dataset.yaml

# Base model. Any YOLOv5 checkpoint works: yolov5n, yolov5s, yolov5m, yolov5l.
# `yolov5su.pt` is the anchor-free YOLOv5 variant shipped by ultralytics.
model: yolov5su.pt

# Core training hyper-parameters.
epochs: 100
batch: 16
imgsz: 640
patience: 25            # early-stopping patience (epochs without improvement)
optimizer: auto        # {auto, SGD, Adam, AdamW}
lr0: 0.01              # initial learning rate
lrf: 0.01              # final LR = lr0 * lrf (cosine schedule)
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
cos_lr: true

# On-the-fly augmentation (mosaic + HSV + geometric) — the pipeline that
# cut experimentation time by front-loading augmentation into training.
augment:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1

# Compute / run bookkeeping.
device: ""             # "" -> auto (CUDA if available), or "cpu", "0", "0,1"
workers: 8
project: runs/train
name: wildlife_yolov5
seed: 42
exist_ok: false

# Validation thresholds used by the evaluator.
val:
  conf: 0.001          # low conf for mAP computation
  iou: 0.6             # NMS IoU threshold
  report_conf: 0.25    # confidence used for the human-readable accuracy report
